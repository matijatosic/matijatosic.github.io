<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <!-- <img src="" /> -->

        <textarea id="motion-txt" rows="20" style="width: 100%"></textarea>
        <!-- <textarea id="orientation-txt"></textarea> -->


        <script>
            window.addEventListener("devicemotion", (e) => {
                document.getElementById('motion-txt').innerHTML = JSON.stringify({
                    x: ('' + e.acceleration.x).substring(0, 10),
                    y: ('' + e.acceleration.y).substring(0, 10),
                    z: ('' + e.acceleration.z).substring(0, 10),
                }, null, 2);
            });

            //         JSON.stringify((({alpha, beta, gamma}) => ({alpha, beta, gamma}))(e), null, 2);
            //     updateOrientation = false;
            // });
        </script>
    </body>
</html>
