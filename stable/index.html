<!DOCTYPE html>
<html>
    <head>
    </head>
    <body>
        <!-- <img src="./img.jpg" style="width: 100vw; position: fixed; top: 0; left: 0;" /> -->

        <textarea id="motion-txt" rows="20" style="width: 100%"></textarea>
        <!-- <textarea id="orientation-txt"></textarea> -->


        <script>
            window.addEventListener("devicemotion", (e) => {
                let { x, y, z } = e.acceleration;
                document.getElementById('motion-txt').innerHTML = JSON.stringify({
                    x: ('' + x).substring(0, 10).replace(/^0/, ' 0'),
                    y: ('' + y).substring(0, 10).replace(/^0/, ' 0'),
                    z: ('' + z).substring(0, 10).replace(/^0/, ' 0'),
                }, null, 2);
            });
            // window.addEventListener("deviceorientation", (e) => {
            //     if (!updateOrientation) return;
            //     document.getElementById('orientation-txt').innerHTML =
            //         JSON.stringify((({alpha, beta, gamma}) => ({alpha, beta, gamma}))(e), null, 2);
            //     updateOrientation = false;
            // });
        </script>
    </body>
</html>
