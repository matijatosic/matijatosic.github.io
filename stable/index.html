        <script>
            let imgLeft = 0, imgTop = 0;
            const img = document.getElementById('img');

            const CORRECTION_MULT = 1;

            window.addEventListener("devicemotion", (e) => {
                let { x, y, z } = e.acceleration;
                imgLeft += 0.01 * x;
                top += 0.01 * y;
                updatePos();
            });

            setInterval(() => {
                if (Math.abs(imgLeft) > 1) {
                    imgLeft -= CORRECTION_MULT * (imgLeft / Math.abs(imgLeft));
                }
                if (Math.abs(top) > 1) {
                    top -= CORRECTION_MULT * (top / Math.abs(top));
                }
                updatePos();
            }, 16);

            function updatePos() {
                img.style.left = imgLeft + 'px';
                img.style.top = imgTop + 'px';
            }
